  #exclude-filter: "星链|Mitce|纵云梯|HGFAST"
  
# Type: url-test
defaultUrlTest: &defaultUrlTest
  type: url-test
  include-all: true
  interval: 180
  tolerance: 50
  url: http://www.gstatic.com/generate_204
  lazy: false
  #<<: *useproxies
  #exclude-filter: "星链Mitce|纵云梯|HGFAST"

# Type: smart
defaultSmart: &defaultSmart
  type: smart
  include-all: true
  policy-priority: ".*试用.*:1.2"
  uselightgbm: true
  collectdata: true
  health-check: 
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 2
  strategy: sticky-sessions
  interval: 180
  #<<: *useproxies
  #exclude-filter: "星链|Mitce|纵云梯|HGFAST"

  #proxies: [直连,所有-手动,所有-自动,香港-自动,台湾-自动,日本-自动,新加坡-自动,美国-自动,亚洲-自动,欧洲-自动,美洲-自动,漏网之鱼,拒绝]
